global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: "job-scheduler"
    environment: "production"

# Alerting rules can be loaded from files
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # ─────────────────────────────────────
  # Prometheus self-monitoring
  # ─────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ─────────────────────────────────────
  # Job Scheduler Backend API
  # ─────────────────────────────────────
  - job_name: "scheduler-backend"
    metrics_path: "/api/prometheus/metrics"
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["backend:5000"]
        labels:
          service: "scheduler-api"
          environment: "production"

  # ─────────────────────────────────────
  # Node Exporter (host metrics)
  # ─────────────────────────────────────
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"

  # ─────────────────────────────────────
  # Redis Exporter (optional)
  # ─────────────────────────────────────
  # - job_name: "redis-exporter"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  #       labels:
  #         service: "redis"

  # ─────────────────────────────────────
  # PostgreSQL Exporter (optional)
  # ─────────────────────────────────────
