apiVersion: 1

providers:
  - name: "Job Scheduler Dashboards"
    orgId: 1
    folder: "Job Scheduler"
    folderUid: "job-scheduler"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
